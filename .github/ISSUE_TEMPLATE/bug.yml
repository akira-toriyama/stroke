name: Bug report
description: A gesture doesn't fire, an action goes to the wrong window, the daemon misbehaves.
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. The most useful single thing you can attach is the
        output of `stroke --doctor` plus the relevant tail of `/tmp/stroke.log`
        (run the daemon with `stroke --debug` for a full trace).

  - type: textarea
    id: doctor
    attributes:
      label: stroke --doctor
      description: Paste the output. It includes the version, Accessibility state, config path, tuned values, and rule list.
      placeholder: |
        stroke doctor
          ✓  Accessibility: granted
          …
      render: shell
    validations:
      required: true

  - type: textarea
    id: log
    attributes:
      label: /tmp/stroke.log excerpt
      description: |
        The trace from the failing gesture. The gold-standard trace is
        `event-tap: down → AX: resolved → event-tap: up → controller: recognised → controller: → rule → dispatch.…`
        — paste whichever lines surround the symptom.
      placeholder: |
        2026-… event-tap: down at (3284, 1471) → com.google.Chrome (pid 38558, wid 88641)
        2026-… AX: resolved point=… via ax-walk → com.google.Chrome wid=88641
        2026-… event-tap: up — samples=572, pattern=DL
        2026-… controller: recognised DL on com.google.Chrome
        2026-… controller: → rule "タブを閉じる"
        2026-… dispatch.key: cmd+w → com.google.Chrome (pid 38558, wid 88641)
      render: text
    validations:
      required: false

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: What gesture did you draw, on what app/window, expecting what?
      placeholder: |
        1. Cursor on a Chrome window's tab strip
        2. Right-click + drag down → left (DL)
        3. Expected the current tab to close; nothing happened.
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Relevant config.toml snippet
      description: The `[[rules]]` block (or `[trigger]` / `[recognition]`) involved. Trim secrets.
      render: toml

  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: "14.5 (23F79) — `sw_vers`"
    validations:
      required: true

  - type: input
    id: install
    attributes:
      label: How did you install stroke?
      placeholder: "brew install akira-toriyama/tap/stroke / built from source / Stroke.zip from a Release"
    validations:
      required: true
